name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  app-tests:
    name: app-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app test suite
        run: npm run test:app

  mcp-suite:
    name: mcp-suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run MCP transport and contract suite
        run: npm run test:mcp

  builder-generated-templates:
    name: builder-generated-templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify local Builder generated templates
        run: npx tsx scripts/verify-builder-generated-templates.ts

  builder-e2e:
    name: builder-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Builder e2e preflight
        run: |
          node --version
          npm --version
          docker --version
          docker compose version
          test -f .env.example
          test -f compose.yaml
          mkdir -p "$RUNNER_TEMP/bizbot-home" "$RUNNER_TEMP/bizbot-builder-workspace" test-results/ci

      - name: Start local infrastructure
        run: docker compose up -d

      - name: Prepare local env file
        run: |
          cp .env.example .env
          mkdir -p "$RUNNER_TEMP/bizbot-home" "$RUNNER_TEMP/bizbot-builder-workspace"
          {
            echo "BIZBOT_HOME_DIR=$RUNNER_TEMP/bizbot-home"
            echo "BIZBOT_BUILDER_WORKSPACE_PATH=$RUNNER_TEMP/bizbot-builder-workspace"
          } >> .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync Prisma schema
        run: npx prisma db push --skip-generate

      - name: Run Builder Playwright spec
        run: npm run test:e2e:builder

      - name: Capture infrastructure logs
        if: failure()
        run: docker compose logs --no-color > test-results/ci/docker-compose.log

      - name: Upload Builder e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: builder-e2e-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

      - name: Stop local infrastructure
        if: always()
        run: docker compose down -v

  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build