name: bizbot

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bizbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bizbot
      POSTGRES_USER: bizbot
      POSTGRES_PASSWORD: bizbot
    ports:
      - "5432:5432"
    volumes:
      - bizbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizbot -d bizbot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: bizbot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bizbot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: bizbot_memgraph
    restart: unless-stopped
    ports:
      - "7687:7687"
      - "7474:3000"
    volumes:
      - bizbot_memgraph_data:/var/lib/memgraph

volumes:
  bizbot_postgres_data:
  bizbot_redis_data:
  bizbot_memgraph_data: